<!DOCTYPE html>
<html>
<head>
  <title>MTG Voice Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <div class="grid">
    <div class="player" data-index="0">
      <input value="Player 1" class="name">
      <div class="life">40</div>
      <div class="controls">
        <button onclick="changeLife(0, -1)">-</button>
        <button onclick="changeLife(0, 1)">+</button>
      </div>
      <div class="extra">☠️ <span class="poison">0</span></div>
    </div>

    <div class="player" data-index="1">
      <input value="Player 2" class="name">
      <div class="life">40</div>
      <div class="controls">
        <button onclick="changeLife(1, -1)">-</button>
        <button onclick="changeLife(1, 1)">+</button>
      </div>
      <div class="extra">☠️ <span class="poison">0</span></div>
    </div>

    <div class="player" data-index="2">
      <input value="Player 3" class="name">
      <div class="life">40</div>
      <div class="controls">
        <button onclick="changeLife(2, -1)">-</button>
        <button onclick="changeLife(2, 1)">+</button>
      </div>
      <div class="extra">☠️ <span class="poison">0</span></div>
    </div>

    <div class="player" data-index="3">
      <input value="Player 4" class="name">
      <div class="life">40</div>
      <div class="controls">
        <button onclick="changeLife(3, -1)">-</button>
        <button onclick="changeLife(3, 1)">+</button>
      </div>
      <div class="extra">☠️ <span class="poison">0</span></div>
    </div>
  </div>

  <div id="voice">
    <button id="mic">🎤 HOLD TO TALK</button>
    <p id="output"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
