<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Companion App</title>
<style>
body {
  margin:0; font-family:Arial,sans-serif;
  background:#1b1b1b; color:white;
  display:flex; flex-direction:column; height:100vh; justify-content:space-between; align-items:center;
}
#player-area { position:relative; width:100%; height:70%; }
.player-card { position:absolute; width:150px; height:180px; border-radius:12px; padding:10px; text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.5); display:flex; flex-direction:column; justify-content:center; font-weight:bold; color:#1a1a1a; transition:all 0.3s ease; background:#fef1c7;}
.player-card input.name { background:transparent; border:none; font-size:16px; text-align:center; font-weight:bold; color:#1a1a1a;}
.player-card .life { font-size:50px; margin:10px 0; transition:all 0.3s ease; }
.player-card .controls button { font-size:18px; margin:2px; padding:4px 8px; border-radius:6px; border:none; cursor:pointer; background:rgba(0,0,0,0.2); transition:transform 0.1s; }
.player-card .controls button:active { transform:scale(1.1);}
.player-card .counters { margin-top:5px; font-size:16px; transition:all 0.3s ease; }
#voice-panel { width:100%; text-align:center; padding:10px; background:rgba(0,0,0,0.3); }
#mic { font-size:20px; padding:15px 25px; border-radius:50px; border:none; background:linear-gradient(135deg,#f2c7c7,#c7e0f2); box-shadow:0 0 15px #fff; cursor:pointer; }
#controls { margin:5px; display:flex; justify-content:center; gap:10px; }
@media(max-width:500px){ .player-card{width:120px;height:150px;} .player-card .life{font-size:40px;} }
</style>
</head>
<body>
<div id="app">
  <div id="player-area"></div>
  <div id="voice-panel">
    <button id="mic">🔮 Hold to Cast</button>
    <p id="voice-output"></p>
  </div>
  <div id="controls">
    <button onclick="saveGame()">💾 Save</button>
    <button onclick="loadGame()">📂 Load</button>
    <button onclick="resetGame()">♻️ Reset</button>
    <select id="player-count" onchange="updatePlayerCount(this.value)">
      <option value="2">2 Players</option>
      <option value="3">3 Players</option>
      <option value="4" selected>4 Players</option>
    </select>
  </div>
</div>
<script>
let numPlayers=4; const playerArea=document.getElementById("player-area"); const playerCards=[]; const players=[]; const colors=["#fef1c7","#c7e0f2","#d4c7f2","#f2c7c7"];
function createPlayers(count){playerArea.innerHTML=""; players.length=0; for(let i=0;i<count;i++){players.push({life:40,poison:0,commander:0}); const card=document.createElement("div"); card.className="player-card"; card.style.background=colors[i]; card.innerHTML=`<input value="Player ${i+1}" class="name"><div class="life">${players[i].life}</div><div class="controls"><button onclick="changeLife(${i},-1)">-</button><button onclick="changeLife(${i},1)">+</button></div><div class="counters">☠️ <span class="poison">0</span> 🗡️ <span class="commander">0</span></div>`; playerArea.appendChild(card); playerCards[i]=card; } positionPlayers();}
function positionPlayers(){ const positions={ 2:[{top:"20%", left:"20%"},{top:"20%", left:"calc(100% - 170px)"}], 3:[{top:"10%",left:"10%"},{top:"10%",left:"calc(100% - 170px)"},{top:"calc(100% - 190px)", left:"calc(50% - 75px)"}], 4:[{top:"5%", left:"5%"},{top:"5%", left:"calc(100% - 155px)"},{top:"calc(100% - 190px)", left:"5%"},{top:"calc(100% - 190px)", left:"calc(100% - 155px)"}] }; playerCards.forEach((c,i)=>{c.style.top=positions[numPlayers][i].top; c.style.left=positions[numPlayers][i].left;});}
function changeLife(i,amt){players[i].life+=amt; updateUI();}
function updateUI(){playerCards.forEach((c,i)=>{c.querySelector(".life").innerText=players[i].life; c.querySelector(".poison").innerText=players[i].poison; c.querySelector(".commander").innerText=players[i].commander;});}
createPlayers(numPlayers);
function updatePlayerCount(val){numPlayers=parseInt(val); createPlayers(numPlayers);}

// Voice
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
const mic = document.getElementById("mic");
const output = document.getElementById("voice-output");
mic.onmousedown=()=>recognition.start();
mic.onmouseup=()=>recognition.stop();
recognition.onresult=(event)=>{const text=event.results[0][0].transcript.toLowerCase(); output.innerText=text; parseCommand(text);}
function findPlayerByName(text){ for(let i=0;i<players.length;i++){const name=playerCards[i].querySelector(".name").value.toLowerCase(); if(text.includes(name)) return i;} return null;}
function parseCommand(text){ const numMatch=text.match(/\d+/); if(!numMatch) return; const value=parseInt(numMatch[0]); const target=findPlayerByName(text) ?? 0; if(text.includes("damage")||text.includes("take")) players[target].life-=value; if(text.includes("gain")) players[target].life+=value; if(text.includes("lifelink")){players[0].life+=value; players[target].life-=value;} if(text.includes("poison")) players[target].poison+=value; if(text.includes("commander")) players[target].commander+=value; updateUI();}

// Save/load/reset
function saveGame(){localStorage.setItem("mtgGame",JSON.stringify(players)); alert("Game Saved");}
function loadGame(){const data=localStorage.getItem("mtgGame"); if(data){const saved=JSON.parse(data); for(let i=0;i<saved.length;i++){players[i].life=saved[i].life; players[i].poison=saved[i].poison; players[i].commander=saved[i].commander;} updateUI(); alert("Game Loaded");} else alert("No saved game");}
function resetGame(){players.forEach(p=>{p.life=40;p.poison=0;p.commander=0;}); updateUI();}
</script>
</body>
</html>
